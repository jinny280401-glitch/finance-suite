<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>看票分析 — Finance Suite</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    if (localStorage.getItem('fs_auth') !== 'ok') {
      location.replace('/?redirect=/app/stock.html');
    }
  </script>
  <style>
    :root {
      --white: #ffffff;
      --surface: #f5f5f7;
      --surface-2: #fafafa;
      --text: #1d1d1f;
      --text-secondary: #86868b;
      --text-tertiary: #a1a1a6;
      --accent: #0071e3;
      --accent-hover: #0077ed;
      --accent-soft: rgba(0,113,227,0.08);
      --border: rgba(0,0,0,0.08);
      --border-light: rgba(0,0,0,0.04);
      --radius: 14px;
      --radius-sm: 10px;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "PingFang SC", sans-serif;
      background: var(--surface);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      padding-top: 52px;
    }

    /* Header */
    .site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      background: rgba(255,255,255,0.78);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--border-light);
      z-index: 100;
      display: flex;
      align-items: center;
      padding: 0 22px;
    }
    .site-header__inner {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .site-header__brand {
      font-size: 14px; font-weight: 600; color: var(--text);
      text-decoration: none; letter-spacing: -0.01em;
      display: flex; align-items: center; gap: 10px;
    }
    .site-header__brand::after {
      content: '看票分析';
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      padding: 3px 8px;
      background: var(--surface);
      border-radius: 6px;
    }
    .hdr-actions { display: flex; align-items: center; gap: 10px; }
    .hdr-btn {
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.2s;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    .hdr-btn--secondary {
      background: var(--surface);
      color: var(--text);
    }
    .hdr-btn--secondary:hover { background: var(--border); }

    /* Main */
    .main-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }
    .page-head {
      margin-bottom: 32px;
    }
    .page-head__title {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 8px;
    }
    .page-head__desc {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* Input Form */
    .analyze-form {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 28px;
    }
    .form-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
      display: block;
    }
    .form-input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: 16px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface-2);
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 16px;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .form-input::placeholder { color: var(--text-tertiary); }
    .form-submit {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s, transform 0.15s var(--ease);
      width: 100%;
    }
    .form-submit:hover { background: var(--accent-hover); }
    .form-submit:active { transform: scale(0.98); }
    .form-submit:disabled {
      background: var(--border);
      color: var(--text-tertiary);
      cursor: not-allowed;
    }

    /* Result */
    .result-container {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      display: none;
    }
    .result-container.show { display: block; }
    .result-loading {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }
    .result-loading__spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    /* 券商研报风格 - 主容器 */
    .result-content {
      max-width: 794px;
      margin: 0 auto;
      background: #fff;
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
      font-size: 13px;
      line-height: 1.8;
      color: #1a1a1a;
    }

    /* 报告封面区 */
    .report-cover {
      background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
      color: #fff;
      padding: 32px 40px;
      margin: -24px -24px 24px -24px;
      border-radius: 0;
    }
    .report-cover h1 {
      font-size: 32px;
      font-weight: 700;
      margin: 0 0 8px 0;
      letter-spacing: 1px;
    }
    .report-cover .report-meta {
      font-size: 13px;
      opacity: 0.85;
      margin-top: 12px;
    }

    /* 核心结论卡片 */
    .conclusion-card {
      background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
      border-left: 4px solid #2563eb;
      padding: 20px 24px;
      margin: 20px 0;
      border-radius: 8px;
    }
    .conclusion-card h3 {
      color: #1e40af;
      font-size: 16px;
      font-weight: 700;
      margin: 0 0 12px 0;
    }

    /* 风险提示区 */
    .risk-warning {
      background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
      border-left: 4px solid #f59e0b;
      padding: 16px 20px;
      margin: 20px 0;
      border-radius: 8px;
    }
    .risk-warning strong {
      color: #92400e;
    }

    /* 章节标题 */
    .result-content h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a1a;
      margin: 32px 0 16px 0;
      padding-bottom: 8px;
      border-bottom: 2px solid #e5e7eb;
    }
    .result-content h2 {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a1a;
      margin: 24px 0 12px 0;
    }
    .result-content h3 {
      font-size: 15px;
      font-weight: 700;
      color: #374151;
      margin: 16px 0 10px 0;
    }
    .result-content h4 {
      font-size: 14px;
      font-weight: 600;
      color: #4b5563;
      margin: 12px 0 8px 0;
    }

    /* 段落和文本 */
    .result-content p {
      margin: 10px 0;
      line-height: 1.8;
      text-align: justify;
    }
    .result-content strong {
      font-weight: 700;
      color: #1a1a1a;
    }
    .result-content em {
      font-style: italic;
      color: #6b7280;
    }

    /* 列表 */
    .result-content ul, .result-content ol {
      margin: 12px 0;
      padding-left: 28px;
    }
    .result-content li {
      margin: 6px 0;
      line-height: 1.7;
    }
    .result-content ul li {
      list-style-type: disc;
    }
    .result-content ol li {
      list-style-type: decimal;
    }

    /* 表格 - 券商研报风格 */
    .result-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 12px;
      border: 1px solid #e5e7eb;
    }
    .result-content table th {
      background: #f3f4f6;
      padding: 10px 12px;
      text-align: left;
      font-weight: 700;
      color: #374151;
      border: 1px solid #e5e7eb;
    }
    .result-content table td {
      padding: 10px 12px;
      border: 1px solid #e5e7eb;
      color: #1f2937;
    }
    .result-content table tr:nth-child(even) {
      background: #f9fafb;
    }
    .result-content table tr:hover {
      background: #f3f4f6;
    }

    /* 来源标记 */
    .source-tag {
      display: inline-block;
      background: #dbeafe;
      color: #1e40af;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin: 0 2px;
    }

    /* 分割线 */
    .result-content hr {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 24px 0;
    }

    /* 引用块 */
    .result-content blockquote {
      background: #f9fafb;
      border-left: 3px solid #6b7280;
      padding: 12px 16px;
      margin: 16px 0;
      font-style: italic;
      color: #4b5563;
    }

    /* 代码块 */
    .result-content code {
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 12px;
      font-family: "SF Mono", Monaco, Consolas, monospace;
      color: #1f2937;
    }
    .result-content pre {
      background: #f9fafb;
      padding: 16px;
      border-radius: 6px;
      overflow-x: auto;
      border: 1px solid #e5e7eb;
      margin: 16px 0;
    }
    .result-content pre code {
      background: none;
      padding: 0;
    }

    /* 数据来源区 */
    .sources-section {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 2px solid #e5e7eb;
    }
    .sources-title {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 12px;
    }
    .source-item {
      background: #f9fafb;
      padding: 10px 14px;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 12px;
      border-left: 3px solid #3b82f6;
    }
    .source-item a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 500;
    }
    .source-item a:hover {
      text-decoration: underline;
    }

    /* 免责声明 */
    .disclaimer {
      margin-top: 32px;
      padding: 16px 20px;
      background: #f9fafb;
      border-radius: 6px;
      font-size: 11px;
      color: #6b7280;
      line-height: 1.6;
      border: 1px solid #e5e7eb;
    }

    /* 错误提示 */
    .result-error {
      color: #dc2626;
      padding: 16px 20px;
      background: #fef2f2;
      border-radius: 8px;
      border-left: 4px solid #dc2626;
    }

    /* PDF 打印样式 */
    @media print {
      body { background: #fff; padding: 0; }
      .site-header, .hdr-actions, .analyze-form, .watchlist-bar { display: none !important; }
      .main-container { padding: 0; max-width: 100%; }
      .result-container { box-shadow: none; border: none; }
      .report-cover { margin: 0; page-break-after: avoid; }
      .result-content h1, .result-content h2 { page-break-after: avoid; }
      .result-content table { page-break-inside: avoid; }
      .conclusion-card, .risk-warning { page-break-inside: avoid; }
      @page { margin: 15mm; }
    }

    /* watchlist action bar */
    .watchlist-bar {
      display: none;
      align-items: center;
      justify-content: space-between;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .watchlist-bar.show { display: flex; }
    .watchlist-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .watchlist-btn:hover { border-color: #f5a623; color: #f5a623; background: rgba(245,166,35,0.06); }
    .watchlist-btn.added { border-color: var(--green); color: var(--green); background: rgba(52,199,89,0.06); cursor: default; }
    .watchlist-btn.added:hover { border-color: var(--green); color: var(--green); background: rgba(52,199,89,0.06); }
    .watchlist-hint { font-size: 11px; color: var(--text-tertiary); }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <a href="/app/" class="site-header__brand">Finance Suite</a>
      <div class="hdr-actions">
        <a href="/app/" class="hdr-btn hdr-btn--secondary">← 返回工作台</a>
      </div>
    </div>
  </header>

  <main class="main-container">
    <div class="page-head">
      <h1 class="page-head__title">看票分析</h1>
      <p class="page-head__desc">个股短平快交易视角，9 章报告 + 4 位大师视角</p>
    </div>

    <form class="analyze-form" id="analyzeForm">
      <label class="form-label" for="queryInput">输入股票代码或名称</label>
      <input
        type="text"
        id="queryInput"
        class="form-input"
        placeholder="例如：比亚迪、002594、宁德时代"
        required
      >
      <button type="submit" class="form-submit" id="submitBtn">开始分析</button>
    </form>

    <div class="result-container" id="resultContainer">
      <div class="result-loading" id="resultLoading">
        <div class="result-loading__spinner"></div>
        <div>正在分析中，请稍候...</div>
      </div>
      <div class="result-content" id="resultContent"></div>
      <div class="watchlist-bar" id="watchlistBar">
        <button class="watchlist-btn" id="watchlistBtn" type="button" onclick="addToWatchlist()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
          <span id="watchlistBtnText">加入自选</span>
        </button>
        <button class="watchlist-btn" id="exportPdfBtn" type="button" onclick="exportToPdf()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          <span id="exportPdfBtnText">导出PDF</span>
        </button>
        <span class="watchlist-hint" id="watchlistHint">分析后可加入长期跟踪票池</span>
      </div>
    </div>
  </main>

  <script>
    const form = document.getElementById('analyzeForm');
    const queryInput = document.getElementById('queryInput');
    const submitBtn = document.getElementById('submitBtn');
    const resultContainer = document.getElementById('resultContainer');
    const resultLoading = document.getElementById('resultLoading');
    const resultContent = document.getElementById('resultContent');
    const watchlistBar = document.getElementById('watchlistBar');
    const watchlistBtn = document.getElementById('watchlistBtn');
    const watchlistBtnText = document.getElementById('watchlistBtnText');
    const watchlistHint = document.getElementById('watchlistHint');
    const exportPdfBtn = document.getElementById('exportPdfBtn');
    const exportPdfBtnText = document.getElementById('exportPdfBtnText');

    let currentQuery = '';
    let currentReportHtml = '';

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const query = queryInput.value.trim();
      if (!query) return;

      currentQuery = query;
      watchlistBar.classList.remove('show');
      watchlistBtn.classList.remove('added');
      watchlistBtnText.textContent = '加入自选';
      watchlistHint.textContent = '分析后可加入长期跟踪票池';

      resultContainer.classList.add('show');
      resultLoading.style.display = 'block';
      resultContent.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = '分析中...';

      try {
        const response = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ skill_type: 'stock', query }),
          credentials: 'include'
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.detail || '分析失败');

        resultLoading.style.display = 'none';
        resultContent.style.display = 'block';
        resultContent.innerHTML = formatResult(data);
        currentReportHtml = resultContent.innerHTML;
        watchlistBar.classList.add('show');

      } catch (error) {
        resultLoading.style.display = 'none';
        resultContent.style.display = 'block';
        resultContent.innerHTML = `<div class="result-error">错误：${error.message}</div>`;
        watchlistBar.classList.add('show');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '开始分析';
      }
    });

    async function addToWatchlist() {
      if (watchlistBtn.classList.contains('added')) return;
      watchlistBtnText.textContent = '添加中…';
      watchlistBtn.disabled = true;

      try {
        const res = await fetch('/api/watchlist/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: currentQuery }),
          credentials: 'include'
        });
        const data = await res.json();

        if (data.already) {
          watchlistBtn.classList.add('added');
          watchlistBtnText.textContent = '已在自选';
          watchlistHint.textContent = data.message;
        } else if (data.success) {
          watchlistBtn.classList.add('added');
          watchlistBtnText.textContent = '已加入自选';
          watchlistHint.textContent = data.message;
        } else {
          watchlistBtnText.textContent = '加入自选';
          watchlistHint.textContent = data.message || '添加失败，请重试';
          watchlistBtn.disabled = false;
        }
      } catch {
        watchlistBtnText.textContent = '加入自选';
        watchlistHint.textContent = '网络错误，请重试';
        watchlistBtn.disabled = false;
      }
    }

    async function exportToPdf() {
      if (!currentReportHtml) {
        alert('请先完成分析后再导出PDF');
        return;
      }

      exportPdfBtnText.textContent = '生成中…';
      exportPdfBtn.disabled = true;

      try {
        const res = await fetch('/api/export-pdf', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            query: currentQuery,
            html: currentReportHtml
          }),
          credentials: 'include'
        });

        if (!res.ok) {
          let errMsg = `导出失败(${res.status})`;
          try {
            const ct = res.headers.get('content-type') || '';
            if (ct.includes('application/json')) {
              const errData = await res.json();
              errMsg = errData?.detail || errData?.message || errData?.error || errMsg;
            } else {
              const text = await res.text();
              if (text) errMsg = text.slice(0, 200);
            }
          } catch (_) {}
          throw new Error(errMsg);
        }

        const contentType = res.headers.get('content-type') || '';
        if (!contentType.includes('application/pdf')) {
          let body = '';
          try { body = await res.text(); } catch (_) {}
          throw new Error(`接口未返回PDF，content-type=${contentType}${body ? `，响应=${body.slice(0, 120)}` : ''}`);
        }

        const blob = await res.blob();
        if (!blob || blob.size === 0) {
          throw new Error('返回的PDF为空');
        }

        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${currentQuery}_分析报告.pdf`;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);

        exportPdfBtnText.textContent = '导出成功';
        setTimeout(() => {
          exportPdfBtnText.textContent = '导出PDF';
          exportPdfBtn.disabled = false;
        }, 2000);
      } catch (error) {
        exportPdfBtnText.textContent = '导出PDF';
        exportPdfBtn.disabled = false;
        alert(error?.message || '导出PDF失败，请重试');
      }
    }

    function formatResult(data) {
      if (typeof data === 'string') {
        return `<div>${marked.parse(data)}</div>`;
      }

      const md = data.result || data.content || '';
      const sources = data.sources || [];

      let html = '';

      if (md) {
        html += marked.parse(md);
      } else {
        html += `<pre>${JSON.stringify(data, null, 2)}</pre>`;
      }

      if (sources.length > 0) {
        html += `<div class="sources-section">
          <div class="sources-title">数据来源</div>`;
        sources.forEach((s, i) => {
          const title = s.title || s.url || `来源${i + 1}`;
          const url = s.url || '#';
          html += `<div class="source-item">【来源${i + 1}】<a href="${url}" target="_blank" rel="noopener">${title}</a></div>`;
        });
        html += `</div>`;
      }

      return html;
    }

    // Pre-fill from sessionStorage (from workbench hot click) or URL param
    const prefill = sessionStorage.getItem('fs_prefill');
    if (prefill) {
      queryInput.value = prefill;
      sessionStorage.removeItem('fs_prefill');
      sessionStorage.removeItem('fs_prefill_skill');
    } else {
      const preQuery = new URLSearchParams(window.location.search).get('q');
      if (preQuery) queryInput.value = preQuery;
    }
  </script>
</body>
</html>
