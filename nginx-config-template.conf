# Finance Suite Nginx 配置文件
# 路径：/etc/nginx/sites-available/finance-suite
# 软链接：ln -s /etc/nginx/sites-available/finance-suite /etc/nginx/sites-enabled/

# HTTP 重定向到 HTTPS
server {
    listen 80;
    server_name touziagent.com www.touziagent.com;
    return 301 https://$host$request_uri;
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    server_name touziagent.com www.touziagent.com;

    # Let's Encrypt SSL 证书（certbot 自动管理）
    ssl_certificate /etc/letsencrypt/live/touziagent.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/touziagent.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 日志
    access_log /var/log/nginx/finance-suite-access.log;
    error_log  /var/log/nginx/finance-suite-error.log;

    # 静态文件根目录
    root /home/ubuntu/finance-suite-web/static;
    index index.html;

    # ========================================
    # 静态首页（精确匹配 /，直接读文件）
    # ========================================
    location = / {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files /index.html =404;
    }

    # ========================================
    # 工作台 + 技能页面
    # ========================================
    location /app/ {
        alias /home/ubuntu/finance-suite-web/static/app/;
        try_files $uri $uri/ /app/index.html;
        default_type text/html;
        add_header Cache-Control "no-cache, must-revalidate, max-age=0";
    }

    # ========================================
    # 静态资源（CSS/JS/图片等）
    # ========================================
    location /static/ {
        alias /home/ubuntu/finance-suite-web/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ========================================
    # API 请求（转发到 Flask/uvicorn:8000）
    # ========================================
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
    }

    # ========================================
    # 其他请求（转发到 Flask）
    # ========================================
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
