map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

upstream backend {
    server 127.0.0.1:8000;
    keepalive 64;
}

# ─── HTTP → HTTPS ─────────────────────────────────────────────────────────────
server {
    if ($host = api.touziagent.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = www.touziagent.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = touziagent.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name touziagent.com www.touziagent.com api.touziagent.com;
    return 301 https://$host$request_uri;






}

# ─── touziagent.com → www（主站只做跳转）─────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name touziagent.com;
    ssl_certificate /etc/letsencrypt/live/touziagent.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/touziagent.com/privkey.pem; # managed by Certbot
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;

    return 301 https://www.touziagent.com$request_uri;

}

# ─── www.touziagent.com（前端 CDN 加速源站）──────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.touziagent.com;
    ssl_certificate /etc/letsencrypt/live/touziagent.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/touziagent.com/privkey.pem; # managed by Certbot
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 20m;

    location /app/ {
        root /home/ubuntu/finance-suite-web/static;
        try_files $uri $uri/index.html =404;
        add_header Cache-Control "no-cache, must-revalidate, max-age=0";
    }

    location /static/ {
        alias /home/ubuntu/finance-suite-web/static/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
        gzip_static on;
    }

    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        add_header Cache-Control "no-store" always;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 120s;
    }

    location / {
        add_header Cache-Control "no-cache" always;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

}

# ─── api.touziagent.com（API 直连，绕过 CDN）─────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.touziagent.com;
    ssl_certificate /etc/letsencrypt/live/touziagent.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/touziagent.com/privkey.pem; # managed by Certbot
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 20m;

    add_header Access-Control-Allow-Origin      "https://www.touziagent.com" always;
    add_header Access-Control-Allow-Methods     "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers     "Content-Type, Authorization" always;
    add_header Access-Control-Allow-Credentials "true" always;

    location / {
        if ($request_method = OPTIONS) {
            return 204;
        }

        limit_req zone=api_limit burst=20 nodelay;
        add_header Cache-Control "no-store" always;

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 120s;
    }

}
